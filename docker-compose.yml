# GraphRAG-Loop Phase 1 本地基础设施。
# 起 Neo4j(带 Graph Data Science 插件,供 PPR)+ Qdrant 向量库。
#
# 用法:
#   docker compose up -d        # 后台启动
#   docker compose ps           # 查看状态
#   docker compose down         # 停止(数据保留在 .docker-data/)
#   docker compose down -v      # 停止并清空数据
#
# 启动后:
#   Neo4j Browser : http://localhost:7474  (用户 neo4j / 密码见 NEO4J_PASSWORD)
#   Qdrant 控制台 : http://localhost:6333/dashboard

services:
  neo4j:
    image: neo4j:5.20
    container_name: graphrag-neo4j
    ports:
      - "7474:7474"   # HTTP / Browser
      - "7687:7687"   # Bolt(driver 连接)
    environment:
      # 密码与 .env 的 NEO4J_PASSWORD 保持一致
      NEO4J_AUTH: neo4j/graphrag123
      # 启用 GDS(Graph Data Science)插件 —— Personalized PageRank 依赖它
      NEO4J_PLUGINS: '["graph-data-science"]'
      # 允许 GDS 过程被调用
      NEO4J_dbms_security_procedures_unrestricted: 'gds.*'
      NEO4J_dbms_security_procedures_allowlist: 'gds.*'
      # 内存(按机器调整)
      NEO4J_server_memory_heap_max__size: '1G'
      NEO4J_server_memory_pagecache_size: '512M'
    volumes:
      - ./.docker-data/neo4j/data:/data
      - ./.docker-data/neo4j/logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: graphrag-qdrant
    ports:
      - "6333:6333"   # REST / 控制台
      - "6334:6334"   # gRPC
    volumes:
      - ./.docker-data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
